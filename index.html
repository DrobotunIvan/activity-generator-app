<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор Активностей</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Генератор Активностей</h1>
    <nav>
      <button id="nav-generator" class="active">Генератор</button>
      <button id="nav-favorites">Улюблені</button>
      <button id="nav-custom">Власні</button>
      <button id="nav-history">Історія</button>
    </nav>
  </header>

  <main>
    <!-- Generator View -->
    <section id="view-generator" class="view active">
      <div class="preferences">
        <h2>Налаштування</h2>
        <div class="filter-group">
          <label>Категорії (Оберіть хоча б одну):</label>
          <div class="checkbox-group" id="category-filters">
            <label><input type="checkbox" value="Спорт"> <span class="cat-icon">🏃</span> Спорт</label>
            <label><input type="checkbox" value="Навчання"> <span class="cat-icon">📚</span> Навчання</label>
            <label><input type="checkbox" value="Креативність"> <span class="cat-icon">🎨</span> Креативність</label>
            <label><input type="checkbox" value="Розваги"> <span class="cat-icon">🎮</span> Розваги</label>
            <label><input type="checkbox" value="На вулиці"> <span class="cat-icon">🏕️</span> На вулиці</label>
            <label><input type="checkbox" value="Відпочинок"> <span class="cat-icon">🧘</span> Відпочинок</label>
          </div>
        </div>
        <div class="filter-group">
          <label for="filter-duration">Макс. тривалість (хв):</label>
          <input type="number" id="filter-duration" placeholder="напр. 60" min="1">
        </div>
        <div class="filter-group">
          <label for="filter-location">Локація:</label>
          <select id="filter-location">
            <option value="">Будь-яка</option>
            <option value="В приміщенні">В приміщенні</option>
            <option value="На вулиці">На вулиці</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-cost">Вартість:</label>
          <select id="filter-cost">
            <option value="">Будь-яка</option>
            <option value="Безкоштовно">Лише безкоштовно</option>
            <option value="Платно">Платно</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-difficulty">Складність:</label>
          <select id="filter-difficulty">
            <option value="">Будь-яка</option>
            <option value="Легко">Легко</option>
            <option value="Середньо">Середньо</option>
            <option value="Складно">Складно</option>
          </select>
        </div>
      </div>
      
      <div class="generator-actions">
        <button id="btn-generate" class="primary">Згенерувати активність</button>
        <p id="generate-error" class="error hidden">Будь ласка, оберіть хоча б одну категорію.</p>
      </div>

      <div id="activity-result" class="result-card hidden">
        <h3 id="res-title"></h3>
        <p id="res-desc"></p>
        <div class="tags">
          <span class="tag" id="res-cat"></span>
          <span class="tag" id="res-dur"></span>
          <span class="tag" id="res-loc"></span>
          <span class="tag" id="res-cost"></span>
          <span class="tag" id="res-diff"></span>
        </div>
        <button id="btn-favorite" class="secondary">Додати до улюблених</button>
      </div>
    </section>

    <!-- Favorites View -->
    <section id="view-favorites" class="view">
      <h2>Улюблені активності</h2>
      <div id="favorites-list" class="card-list"></div>
    </section>

    <!-- Custom View -->
    <section id="view-custom" class="view">
      <h2>Власні активності</h2>
      <form id="form-custom" class="preferences">
        <div class="filter-group">
          <label for="cust-title">Назва:</label>
          <input type="text" id="cust-title" required>
        </div>
        <div class="filter-group">
          <label for="cust-desc">Опис:</label>
          <textarea id="cust-desc" required></textarea>
        </div>
        <div class="filter-group">
          <label for="cust-cat">Категорія:</label>
          <select id="cust-cat" required>
            <option value="Спорт">Спорт</option>
            <option value="Навчання">Навчання</option>
            <option value="Креативність">Креативність</option>
            <option value="Розваги">Розваги</option>
            <option value="На вулиці">На вулиці</option>
            <option value="Відпочинок">Відпочинок</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="cust-dur">Тривалість (хв):</label>
          <input type="number" id="cust-dur" required min="1">
        </div>
        <div class="filter-group">
          <label for="cust-loc">Локація:</label>
          <select id="cust-loc" required>
            <option value="В приміщенні">В приміщенні</option>
            <option value="На вулиці">На вулиці</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="cust-cost">Вартість:</label>
          <select id="cust-cost" required>
            <option value="Безкоштовно">Безкоштовно</option>
            <option value="Платно">Платно</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="cust-diff">Складність:</label>
          <select id="cust-diff" required>
            <option value="Легко">Легко</option>
            <option value="Середньо">Середньо</option>
            <option value="Складно">Складно</option>
          </select>
        </div>
        <button type="submit" class="primary">Додати власну активність</button>
      </form>
      <div id="custom-list" class="card-list"></div>
    </section>

    <!-- History View -->
    <section id="view-history" class="view">
      <h2>Історія та статистика</h2>
      <div class="stats-card">
        <p>Всього згенеровано: <strong id="stat-total">0</strong></p>
        <p>Всього улюблених: <strong id="stat-favs">0</strong></p>
      </div>
      <h3>Недавні генерації</h3>
      <div id="history-list" class="card-list"></div>
      
      <div class="danger-zone">
        <h3>Скинути дані</h3>
        <button id="btn-reset" class="danger">Скинути демо-дані</button>
      </div>
    </section>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
